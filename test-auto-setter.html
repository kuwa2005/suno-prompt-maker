<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>auto-setter テスト</title>
</head>
<body>
<h1>auto-setter テスト</h1>
<div id="results"></div>

<script type="module">
  import './src/data.js';
  import { extractCategoriesWithTranslation, isFallbackMode } from './src/ternlight-engine.js';

  const results = document.getElementById('results');

  // テストケース
  const testCases = [
    { input: '80年代ポップス', expected: ['era', '年代80', 'genre', 'style'] },
    { input: 'お洒落なカフェで流れるチルい曲', expected: ['style', 'mood'] },
    { input: 'Cafe lounge music, chill vibes', expected: ['genre', 'style', 'mood'] },
    { input: 'Upbeat dance pop, catchy hooks', expected: ['genre', 'style'] },
    { input: 'Heavy metal, distorted guitars', expected: ['genre', 'style'] },
    { input: 'Uplifting Trance', expected: ['genre'] },
  ];

  let html = '<h2>テスト結果</h2>';

  for (const tc of testCases) {
    const categoryScores = await extractCategoriesWithTranslation(tc.input);
    const found = Object.keys(categoryScores);

    // 除外カテゴリを削除（ジャンル）
    delete categoryScores['genre'];

    const passed = found.length > 0;
    const status = passed ? '✓ PASS' : '✗ FAIL';

    html += '<div style="margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">';
    html += `<strong>${status}</strong>: "${tc.input}"<br>`;
    html += `見つかったカテゴリ: ${JSON.stringify(found)}<br>`;
    html += `スコア: ${JSON.stringify(categoryScores)}`;
    html += '</div>';
  }

  results.innerHTML = html;
</script>
</body>
</html>
